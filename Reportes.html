<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reportes · Método NERI</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{--black:#080808;--surface:#111;--gold:#C9A96E;--border:rgba(255,255,255,.1);--w50:rgba(255,255,255,.5)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--black);color:#fff;font-family:Montserrat,sans-serif;display:flex;align-items:center;justify-content:center;padding:28px}
    .card{width:min(760px,100%);background:linear-gradient(180deg,#151515,#0f0f0f);border:1px solid var(--border);border-top:2px solid var(--gold);padding:34px}
    .eyebrow{font-size:8px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:12px}.title{font-family:'Bebas Neue',sans-serif;font-size:58px;letter-spacing:3px;line-height:.9}.title em{color:var(--gold);font-style:normal}.text{font-size:13px;color:var(--w50);line-height:1.8;margin-top:16px}.pill{display:inline-block;margin-top:20px;border:1px solid rgba(201,169,110,.25);color:var(--gold);padding:8px 12px;font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Método NERI</div>
    <div class="title">REPORTES <em>BASE</em></div>
    <div class="text">Archivo raíz conservado para que la ruta Reportes.html no marque 404 durante la etapa de prueba/error. Los reportes reales se conectarán después de confirmar la navegación general.</div>
    <div class="pill">Modo prueba abierto</div>
  </main>
</body>
</html>
